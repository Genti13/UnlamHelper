<main class="container-fluid px-4 mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-light text-white mb-0">Materias</h2>
    </div>

    <div class="row g-2">
        @for (materia of materiasService.materias(); track materia.id) {

        <div class="col-md-12">
            <div class="card miel-card p-3 shadow-sm">
                <div class="d-flex align-items-center flex-wrap">

                    <div class="col-md-4 col-sm-8 col-lg-2">
                        <h5 class="mb-1 text-white text-truncate" style="max-width: 200px;">{{ materia.nombre }}</h5>
                        <small class="text-secondary">{{ materia.codigo }}</small>
                    </div>

                    <div class="miel-icon-container col-md-7 col-sm-3 col-lg-9">
                        <div class="miel-icon-stack cursor-pointer py-2" (click)="abrirModalAltaPregunta(materia.id)">
                            <i class="fa-solid fa-circle-plus"></i>
                            <p class="mt-2 fs-btn m-0 fs-btn">Nueva Pregunta</p>
                        </div>

                        <div class="miel-icon-stack cursor-pointer py-2" (click)="abrirModalVerPreguntas(materia.id)">
                            <i class="fa-solid fa-file-lines"></i>
                            <p class="mt-2 fs-btn m-0">Ver Preguntas</p>
                        </div>

                        <div class="miel-icon-stack cursor-pointer py-2" (click)="irASimulacion(materia.id)">
                            <i class="fa-solid fa-circle-play"></i>
                            <p class="mt-2 fs-btn m-0">Simular Examen</p>
                        </div>

                        <div class="miel-icon-stack cursor-pointer py-2" (click)="exportarMateria(materia)">
                             <i class="fa-solid fa-file-export"></i>
                            <p class="mt-2 fs-btn m-0">Exportar a JSON</p>
                        </div>

                    </div>

                </div>
            </div>
        </div>

        } @empty {
        <div class="col-12">
            <p class="text-secondary">No hay materias cargadas. Hacé clic en "Alta Materia" en el menú para arrancar.
            </p>
        </div>
        }
    </div>
</main>
